name: K8S Demo CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/k8sdemo

jobs:
  # ============ Test ============
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, order-service, product-service, user-service]
    steps:
      - uses: actions/checkout@v4

      - name: Run tests for ${{ matrix.service }}
        run: |
          echo "Running tests for ${{ matrix.service }}..."
          # Add actual test commands per service
          # npm test, pytest, go test, etc.

  # ============ Build & Push Docker Images ============
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [api-gateway, order-service, product-service, user-service, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============ Deploy to K8S ============
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Deploy to K8S
        run: |
          # Apply all K8S manifests
          kubectl apply -f k8s/ --recursive -n k8sdemo

          # Update images to new version
          for service in api-gateway order-service product-service user-service frontend; do
            kubectl set image deployment/${service} \
              ${service}=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${service}:${{ github.sha }} \
              -n k8sdemo
          done

      - name: Verify rollout
        run: |
          for service in api-gateway order-service product-service user-service frontend; do
            echo "Checking rollout for ${service}..."
            kubectl rollout status deployment/${service} -n k8sdemo --timeout=120s
          done

      - name: Health check
        run: |
          echo "Waiting for services to be ready..."
          sleep 30
          kubectl get pods -n k8sdemo
          kubectl get hpa -n k8sdemo
