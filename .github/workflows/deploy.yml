# CI/CD Workflow for Wafer BI Platform
# ----------------------------------
# Migrated from OCI Registry (OCIR) to GitHub Container Registry (GHCR) 
# to avoid OCI Free Tier service restrictions and credential issues.
# ----------------------------------
name: CI - Build and Push Images

on:
  push:
    branches: [ main ]
    # 只有當這些路徑下的檔案變動時，才觸發整個流水線（或特定 Job）
    paths:
      - 'services/**'
      - 'k8s/**'
      - '.github/workflows/**'

permissions:
  contents: write
  packages: write

jobs:
  # 定義一個共用的準備步驟，例如處理名稱小寫
  setup:
    runs-on: ubuntu-latest
    outputs:
      owner_lc: ${{ steps.owner_lc.outputs.owner_lc }}
    steps:
      - id: owner_lc
        run: echo "owner_lc=${OWNER,,}" >> $GITHUB_OUTPUT
        env:
          OWNER: '${{ github.repository_owner }}'

  # 這裡將四個服務拆成平行執行的 Job
  build-services:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [wafer-bi-backend, wafer-bi-frontend, api-gateway, user-service, ai-mcp-service]
        include:
          - service: wafer-bi-backend
            context: ./services/wafer-bi
          - service: wafer-bi-frontend
            context: ./services/frontend
          - service: api-gateway
            context: ./services/api-gateway
          - service: user-service
            context: ./services/user-service
          - service: ai-mcp-service
            context: ./services/ai-mcp-service
    
    name: Build ${{ matrix.service }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: Wandalen/wretry.action@v1.3.0
        with:
          action: docker/login-action@v3
          with: |
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}
          attempt_limit: 3
          attempt_delay: 10000

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/${{ needs.setup.outputs.owner_lc }}/${{ matrix.service }}:latest
            ghcr.io/${{ needs.setup.outputs.owner_lc }}/${{ matrix.service }}:${{ github.sha }}
          # 關鍵：啟用 GitHub Action 專用快取，沒改動的地方會直接跳過
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 所有 Build 完成後，統一更新 K8s 部署時間戳記觸發 Rollout
  deploy-trigger:
    needs: [setup, build-services]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Trigger Kubernetes Rollout
        run: |
          DEPLOY_DATE=$(date +'%Y-%m-%d %H:%M:%S')
          OWNER_LC=${{ needs.setup.outputs.owner_lc }}
          
          # 更新所有部署檔的時間戳記
          find k8s/ -name "*.yaml" -exec sed -i "s|deployed-at:.*|deployed-at: \"${DEPLOY_DATE}\"|g" {} +
          
          # 更新映像檔標籤
          sed -i "s|image: ghcr.io/${OWNER_LC}/user-service:.*|image: ghcr.io/${OWNER_LC}/user-service:${{ github.sha }}|g" k8s/base/user-service/deployment.yaml
          sed -i "s|image: ghcr.io/${OWNER_LC}/api-gateway:.*|image: ghcr.io/${OWNER_LC}/api-gateway:${{ github.sha }}|g" k8s/base/api-gateway/deployment.yaml
          sed -i "s|image: ghcr.io/${OWNER_LC}/wafer-bi-backend:.*|image: ghcr.io/${OWNER_LC}/wafer-bi-backend:${{ github.sha }}|g" k8s/base/wafer-bi-deployment.yaml
          sed -i "s|image: ghcr.io/${OWNER_LC}/wafer-bi-frontend:.*|image: ghcr.io/${OWNER_LC}/wafer-bi-frontend:${{ github.sha }}|g" k8s/base/wafer-bi-deployment.yaml
          sed -i "s|image: ghcr.io/${OWNER_LC}/ai-mcp-service:.*|image: ghcr.io/${OWNER_LC}/ai-mcp-service:${{ github.sha }}|g" k8s/base/ai-mcp-service/deployment.yaml
          
          # 設定 Git 使用者資訊並提交
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add k8s/
          git commit -m "deploy: trigger rollout at ${DEPLOY_DATE} [skip ci]" || echo "No changes to commit"
          git pull --rebase origin main
          git push
