name: CI - Build and Push Images

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    name: Build and Push to OCIR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to OCIR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.OCI_REGION }}.ocir.io
          username: ${{ secrets.OCI_TENANCY_NAMESPACE }}/${{ secrets.OCI_USER_NAME }}
          password: ${{ secrets.OCI_AUTH_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./services/wafer-bi
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.OCI_REGION }}.ocir.io/${{ secrets.OCI_TENANCY_NAMESPACE }}/wafer-bi-backend:latest
            ${{ secrets.OCI_REGION }}.ocir.io/${{ secrets.OCI_TENANCY_NAMESPACE }}/wafer-bi-backend:${{ github.sha }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./services/frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.OCI_REGION }}.ocir.io/${{ secrets.OCI_TENANCY_NAMESPACE }}/wafer-bi-frontend:latest
            ${{ secrets.OCI_REGION }}.ocir.io/${{ secrets.OCI_TENANCY_NAMESPACE }}/wafer-bi-frontend:${{ github.sha }}

      - name: Build and Push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./services/api-gateway
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.OCI_REGION }}.ocir.io/${{ secrets.OCI_TENANCY_NAMESPACE }}/api-gateway:latest
            ${{ secrets.OCI_REGION }}.ocir.io/${{ secrets.OCI_TENANCY_NAMESPACE }}/api-gateway:${{ github.sha }}

      - name: Build and Push User Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/user-service
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.OCI_REGION }}.ocir.io/${{ secrets.OCI_TENANCY_NAMESPACE }}/user-service:latest
            ${{ secrets.OCI_REGION }}.ocir.io/${{ secrets.OCI_TENANCY_NAMESPACE }}/user-service:${{ github.sha }}

      - name: Update Kubernetes Manifests
        run: |
          # 使用 regex 匹配冒號後的任何標籤並替換為當前的 commit sha
          sed -i "s|wafer-bi-backend:.*|wafer-bi-backend:${{ github.sha }}|g" k8s/wafer-bi-deployment.yaml
          sed -i "s|wafer-bi-frontend:.*|wafer-bi-frontend:${{ github.sha }}|g" k8s/wafer-bi-deployment.yaml
          sed -i "s|api-gateway:.*|api-gateway:${{ github.sha }}|g" k8s/api-gateway/deployment.yaml
          sed -i "s|user-service:.*|user-service:${{ github.sha }}|g" k8s/user-service/deployment.yaml
          
          # 設定 Git 使用者資訊
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 只有在有變動時才 commit 並 push
          if [ -n "$(git status --porcelain)" ]; then
            git add k8s/
            git commit -m "chore: update image tags to ${{ github.sha }} [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
