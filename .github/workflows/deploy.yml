name: CI - Build and Push Images

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build and Push to OCIR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to OCIR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.OCI_REGION }}.ocir.io
          username: ${{ secrets.OCI_TENANCY_NAMESPACE }}/${{ secrets.OCI_USER_NAME }}
          password: ${{ secrets.OCI_AUTH_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./services/wafer-bi
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.OCI_REGION }}.ocir.io/${{ secrets.OCI_TENANCY_NAMESPACE }}/wafer-bi-backend:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./services/frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.OCI_REGION }}.ocir.io/${{ secrets.OCI_TENANCY_NAMESPACE }}/wafer-bi-frontend:latest

      - name: Build and Push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./services/api-gateway
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.OCI_REGION }}.ocir.io/${{ secrets.OCI_TENANCY_NAMESPACE }}/api-gateway:latest

      - name: Build and Push User Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/user-service
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.OCI_REGION }}.ocir.io/${{ secrets.OCI_TENANCY_NAMESPACE }}/user-service:latest
