# CI/CD Workflow for Wafer BI Platform
# ----------------------------------
# Migrated from OCI Registry (OCIR) to GitHub Container Registry (GHCR) 
# to avoid OCI Free Tier service restrictions and credential issues.
# ----------------------------------
name: CI - Build and Push Images

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    name: Build and Push to OCIR
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Required for updating k8s manifests in the repo
      packages: write   # Required for pushing images to ghcr.io
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # IMPORTANT: Docker image paths MUST be lowercase. 
      # This step converts the GitHub Username (which may have uppercase) to lowercase.
      - name: Lowercase repo owner
        run: |
          echo "OWNER_LC=${OWNER,,}" >>${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      # Log in using the built-in GITHUB_TOKEN. No OCI Secrets required for this part.
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./services/wafer-bi
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/wafer-bi-backend:latest
            ghcr.io/${{ env.OWNER_LC }}/wafer-bi-backend:${{ github.sha }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./services/frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/wafer-bi-frontend:latest
            ghcr.io/${{ env.OWNER_LC }}/wafer-bi-frontend:${{ github.sha }}

      - name: Build and Push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./services/api-gateway
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/api-gateway:latest
            ghcr.io/${{ env.OWNER_LC }}/api-gateway:${{ github.sha }}

      - name: Build and Push User Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/user-service
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/user-service:latest
            ghcr.io/${{ env.OWNER_LC }}/user-service:${{ github.sha }}

      - name: Trigger Kubernetes Rollout
        run: |
          # 獲取當前時間戳記
          DEPLOY_DATE=$(date +'%Y-%m-%d %H:%M:%S')
          
          # 更新部署註解與映像檔標籤，實現精準版本控制 (GitOps)
          # 這會讓 Argo CD 檢測到 Git 異動並執行 Rolling Update
          
          # 1. Update User Service
          sed -i "s|deployed-at:.*|deployed-at: \"${DEPLOY_DATE}\"|g" k8s/base/user-service/deployment.yaml
          sed -i "s|image: ghcr.io/${OWNER_LC}/user-service:.*|image: ghcr.io/${OWNER_LC}/user-service:${{ github.sha }}|g" k8s/base/user-service/deployment.yaml
          
          # 2. Update API Gateway
          sed -i "s|deployed-at:.*|deployed-at: \"${DEPLOY_DATE}\"|g" k8s/base/api-gateway/deployment.yaml
          sed -i "s|image: ghcr.io/${OWNER_LC}/api-gateway:.*|image: ghcr.io/${OWNER_LC}/api-gateway:${{ github.sha }}|g" k8s/base/api-gateway/deployment.yaml
          
          # 3. Update Wafer BI (Backend & Frontend)
          sed -i "s|deployed-at:.*|deployed-at: \"${DEPLOY_DATE}\"|g" k8s/base/wafer-bi-deployment.yaml
          sed -i "s|image: ghcr.io/${OWNER_LC}/wafer-bi-backend:.*|image: ghcr.io/${OWNER_LC}/wafer-bi-backend:${{ github.sha }}|g" k8s/base/wafer-bi-deployment.yaml
          sed -i "s|image: ghcr.io/${OWNER_LC}/wafer-bi-frontend:.*|image: ghcr.io/${OWNER_LC}/wafer-bi-frontend:${{ github.sha }}|g" k8s/base/wafer-bi-deployment.yaml
          
          # 設定 Git 使用者資訊並提交
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add k8s/
          git commit -m "deploy: trigger rollout at ${DEPLOY_DATE} [skip ci]" || echo "No changes to commit"
          git pull --rebase origin main
          git push
