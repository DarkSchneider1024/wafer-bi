services:
  # ============ Infrastructure ============
  postgres:
    image: postgres:16-alpine
    container_name: k8sdemo-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_local_properties}
      POSTGRES_DB: k8sdemo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d k8sdemo"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: k8sdemo-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ============ Backend Services ============
  product-service:
    build: ./services/product-service
    container_name: k8sdemo-product-service
    ports:
      - "5000:5000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: k8sdemo
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_local_properties}
      PRODUCT_SERVICE_PORT: "5000"
    depends_on:
      postgres:
        condition: service_healthy

  order-service:
    build: ./services/order-service
    container_name: k8sdemo-order-service
    ports:
      - "3001:3001"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: k8sdemo
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_local_properties}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      ORDER_SERVICE_PORT: "3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  user-service:
    build: ./services/user-service
    container_name: k8sdemo-user-service
    ports:
      - "3002:3002"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: k8sdemo
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_local_properties}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_local_properties}
      USER_SERVICE_PORT: "3002"
    depends_on:
      postgres:
        condition: service_healthy

  # ============ API Gateway ============
  api-gateway:
    build: ./services/api-gateway
    container_name: k8sdemo-api-gateway
    ports:
      - "8080:8080"
    environment:
      API_GATEWAY_PORT: "8080"
      PRODUCT_SERVICE_HOST: product-service
      PRODUCT_SERVICE_PORT: "5000"
      ORDER_SERVICE_HOST: order-service
      ORDER_SERVICE_PORT: "3001"
      USER_SERVICE_HOST: user-service
      USER_SERVICE_PORT: "3002"
      JWT_SECRET: ${JWT_SECRET:-change_me_in_local_properties}
    depends_on:
      - product-service
      - order-service
      - user-service

volumes:
  postgres_data:
