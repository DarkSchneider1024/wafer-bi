apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: k8sdemo
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: k8sdemo
spec:
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
