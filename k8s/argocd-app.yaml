apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wafer-bi-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/DarkSchneider1024/wafer-bi.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: k8sdemo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
