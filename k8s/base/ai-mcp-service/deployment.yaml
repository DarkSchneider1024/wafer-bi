apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-mcp-service
  namespace: k8sdemo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-mcp-service
  template:
    metadata:
      labels:
        app: ai-mcp-service
        env: production
        managed-by: argocd
      annotations:
        deployed-at: "2026-05-13 07:33:38"
    spec:
      imagePullSecrets:
        - name: ocirsecret
      containers:
      - name: ai-mcp
        image: ghcr.io/darkschneider1024/ai-mcp-service:9018ef86dded9add51b04cf67ed9c76883294ed8
        imagePullPolicy: Always
        ports:
        - containerPort: 8001
        env:
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: GEMINI_API_KEY
        - name: DELTA_PATH
          value: "/app/wafer_delta_table"
        volumeMounts:
        - name: chroma-storage
          mountPath: /app/chroma_db
        - name: wafer-data
          mountPath: /app/wafer_delta_table
          readOnly: true
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      volumes:
      - name: chroma-storage
        persistentVolumeClaim:
          claimName: chroma-data-pvc
      - name: wafer-data
        hostPath:
          path: /mnt/wafer_delta_table # Adjust this to where the delta table is stored in K8s
          type: Directory
