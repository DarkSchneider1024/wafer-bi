apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: k8sdemo
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: k8sdemo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      annotations:
        deployed-at: "2026-05-13 05:05:09"
      labels:
        app: api-gateway
        env: production
        managed-by: argocd
    spec:
      imagePullSecrets:
        - name: ocirsecret
      containers:
        - name: api-gateway
          image: ghcr.io/darkschneider1024/api-gateway:240d4964f6ee5e71b5fb2edda31aa93febefc429
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
