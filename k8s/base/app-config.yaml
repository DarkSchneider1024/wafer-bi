apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  labels:
    app.kubernetes.io/part-of: k8sdemo
data:
  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "k8sdemo"
  POSTGRES_USER: "admin"
  USER_SERVICE_PORT: "3002"
  WAFER_BI_HOST: "wafer-backend-svc.k8sdemo.svc.cluster.local"
  WAFER_BI_PORT: "8000"
  API_GATEWAY_PORT: "8080"
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  AI_MCP_SERVICE_HOST: "ai-mcp-service"
  AI_MCP_SERVICE_PORT: "8001"
  # 強制啟用 Liquibase，確保資料庫結構同步
  SPRING_LIQUIBASE_ENABLED: "true"
