apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: k8sdemo
  labels:
    app.kubernetes.io/part-of: k8sdemo
data:
  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "k8sdemo"
  POSTGRES_USER: "admin"
  USER_SERVICE_PORT: "3002"
  WAFER_BI_HOST: "wafer-backend-svc.wafer-bi.svc.cluster.local"
  WAFER_BI_PORT: "8000"
  API_GATEWAY_PORT: "8080"
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  # 強制開啟 Liquibase，確保它不會被任何地方蓋掉
  SPRING_LIQUIBASE_ENABLED: "true"
