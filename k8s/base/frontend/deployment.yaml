apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: k8sdemo
  labels:
    app: frontend
    app.kubernetes.io/part-of: k8sdemo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        env: production
        managed-by: argocd
    spec:
      imagePullSecrets:
        - name: ocirsecret
      containers:
        - name: frontend
          image: ap-tokyo-1.ocir.io/nrf3s0wa8lv5/wafer-bi-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
