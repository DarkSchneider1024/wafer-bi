apiVersion: apps/v1
kind: Deployment
metadata:
  name: license-service
  labels:
    app: license-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: license-service
  template:
    metadata:
      labels:
        app: license-service
    spec:
      containers:
      - name: license-service
        image: ${DOCKER_IMAGE_LICENSE_SERVICE:-license-service:latest}
        ports:
        - containerPort: 8005
        env:
        - name: VAULT_ADDR
          value: "http://openbao:8200"
        - name: VAULT_TOKEN
          value: "root"
        livenessProbe:
          httpGet:
            path: /health
            port: 8005
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: license-service
spec:
  selector:
    app: license-service
  ports:
  - protocol: TCP
    port: 8005
    targetPort: 8005
