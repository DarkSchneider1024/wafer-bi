# Network Policy: Only allow API Gateway to access backend services
# This demonstrates zero-trust networking in K8S
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-access-policy
  namespace: k8sdemo
  labels:
    app.kubernetes.io/part-of: k8sdemo
spec:
  podSelector:
    matchLabels: {}  # Apply to all pods in namespace
  policyTypes:
    - Ingress
  ingress:
    # 1. Allow all pods to receive traffic from within the same namespace
    - from:
        - podSelector: {}
    # 2. Allow traffic from the Ingress Controller (typically in ingress-nginx namespace)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
    # 3. For OKE/OCI LoadBalancer compatibility, allow traffic from kube-system
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
---
# Restrict direct access to databases: only backend services can connect
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-access-policy
  namespace: k8sdemo
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: product-service
        - podSelector:
            matchLabels:
              app: order-service
        - podSelector:
            matchLabels:
              app: user-service
      ports:
        - port: 5432
          protocol: TCP
---
# Redis: only Order Service can access
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-access-policy
  namespace: k8sdemo
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: order-service
      ports:
        - port: 6379
          protocol: TCP
