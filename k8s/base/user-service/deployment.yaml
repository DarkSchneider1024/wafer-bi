apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: k8sdemo
  labels:
    app: user-service
    app.kubernetes.io/part-of: k8sdemo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: user-service
        env: production
        managed-by: argocd
      annotations:
        deployed-at: "2026-05-15 05:46:16"
    spec:
      initContainers:
        - name: wait-for-postgres
          image: docker.io/library/busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              until nc -z postgres-service 5432; do
                echo "PostgreSQL is not ready - sleeping 2s"
                sleep 2
              done
              echo "PostgreSQL is ready!"
      imagePullSecrets:
        - name: ocirsecret
      containers:
        - name: user-service
          image: ghcr.io/darkschneider1024/user-service:1637a34
          imagePullPolicy: Always
          ports:
            - containerPort: 3002
              name: http
          env:
            - name: SPRING_LIQUIBASE_ENABLED
              value: "true"
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3002
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3002
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
