---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: wafer-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wafer-backend
  template:
    metadata:
      labels:
        app: wafer-backend
        env: production
        managed-by: argocd
      annotations:
        deployed-at: "2026-05-11 22:18:46"
    spec:
      imagePullSecrets:
        - name: ocirsecret
      containers:
      - name: backend
        image: ghcr.io/darkschneider1024/wafer-bi-backend:284ff023ffbf90f72a9279561b2e12ca05eb2094
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"

---

apiVersion: v1
kind: Service
metadata:
  name: wafer-backend-svc
spec:
  selector:
    app: wafer-backend
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
  type: ClusterIP

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: wafer-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wafer-frontend
  template:
    metadata:
      labels:
        app: wafer-frontend
        env: production
        managed-by: argocd
      annotations:
        deployed-at: "2026-05-11 22:18:46"
    spec:
      imagePullSecrets:
        - name: ocirsecret
      containers:
      - name: frontend
        image: ghcr.io/darkschneider1024/wafer-bi-frontend:284ff023ffbf90f72a9279561b2e12ca05eb2094
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        env:
        - name: VITE_API_URL
          valueFrom:
            configMapKeyRef:
              name: wafer-config
              key: VITE_API_URL
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"

---

apiVersion: v1
kind: Service
metadata:
  name: wafer-frontend-svc
spec:
  selector:
    app: wafer-frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: ClusterIP
