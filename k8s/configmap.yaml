apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: k8sdemo
  labels:
    app.kubernetes.io/part-of: k8sdemo
data:
  # API Gateway
  API_GATEWAY_PORT: "8080"
  LOG_LEVEL: "info"
  NODE_ENV: "production"

  # Product Service
  PRODUCT_SERVICE_HOST: "product-service"
  PRODUCT_SERVICE_PORT: "5000"

  # Order Service
  ORDER_SERVICE_HOST: "order-service"
  ORDER_SERVICE_PORT: "3001"

  # User Service
  USER_SERVICE_HOST: "user-service"
  USER_SERVICE_PORT: "3002"

  # Redis
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"

  # PostgreSQL
  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "k8sdemo"
