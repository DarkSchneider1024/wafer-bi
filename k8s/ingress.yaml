apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: k8sdemo-ingress
  namespace: k8sdemo
  labels:
    app.kubernetes.io/part-of: k8sdemo
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - carrot-design-atelier.online
      secretName: oci-tls-secret
  rules:
    - host: carrot-design-atelier.online
      http:
        paths:
          # Wafer BI Frontend (In wafer-bi namespace)
          - path: /()(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: wafer-frontend-svc
                port:
                  number: 80

          # Wafer BI Backend API (In wafer-bi namespace)
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: wafer-backend-svc
                port:
                  number: 8000
