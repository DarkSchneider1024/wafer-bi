apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - argocd-ingress.yaml

# Production specific annotations (safe - doesn't modify selectors)
commonAnnotations:
  environment: production
  managed-by: argocd

images:
  - name: license-service
    newName: ghcr.io/darkschneider1024/wafer-bi/license-service
    newTag: latest
