# ⚠️ NOTE: In production, use external secret management (Vault, AWS KMS, etc.)
# base64 encoding is NOT encryption — it's just encoding.
# kubectl create secret generic app-secrets --from-literal=... is preferred.
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: k8sdemo
  labels:
    app.kubernetes.io/part-of: k8sdemo
type: Opaque
data:
  # echo -n 'postgres_password_123' | base64
  POSTGRES_PASSWORD: cG9zdGdyZXNfcGFzc3dvcmRfMTIz
  # echo -n 'super_secret_jwt_key_2024' | base64
  JWT_SECRET: c3VwZXJfc2VjcmV0X2p3dF9rZXlfMjAyNA==
  # echo -n 'admin' | base64
  POSTGRES_USER: YWRtaW4=
