apiVersion: v1
kind: ConfigMap
metadata:
  name: alerting-rules
  namespace: k8sdemo
data:
  alerting-rules.yml: |
    groups:
      - name: k8sdemo-alerts
        rules:
          # Alert when a pod is down for more than 5 minutes
          - alert: PodDown
            expr: up == 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.instance }} is down"
              description: "{{ $labels.job }} pod has been down for more than 5 minutes."

          # Alert when CPU usage is above 80% for 10 minutes
          - alert: HighCPUUsage
            expr: rate(process_cpu_seconds_total[5m]) > 0.8
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "High CPU usage on {{ $labels.instance }}"
              description: "CPU usage has been above 80% for 10 minutes."

          # Alert when request latency p95 exceeds 1 second
          - alert: HighLatency
            expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High latency on {{ $labels.instance }}"
              description: "95th percentile latency is above 1 second."

          # Alert when error rate exceeds 5%
          - alert: HighErrorRate
            expr: |
              sum(rate(http_requests_total{status_code=~"5.."}[5m]))
              /
              sum(rate(http_requests_total[5m]))
              > 0.05
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "High error rate detected"
              description: "Error rate is above 5% for the last 5 minutes."
